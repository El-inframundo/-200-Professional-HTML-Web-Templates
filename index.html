<body>

  </div>

<div class="footer">2024 — Private Database</div>

<script>
const FILE_URLS = [
  'https://tinyurl.com/part1-db',
  'https://tinyurl.com/part2-db',
  'https://tinyurl.com/part3-db',
  'https://bit.ly/3part4db',
  'https://bit.ly/3part5db',
  'https://shorte.st/part6db',
  'https://shorte.st/part7db'
];

let FILE_CONTENT = '';

async function loadAllFiles() {
  try {
    for (const url of FILE_URLS) {
      const res = await fetch(url);
      if (!res.ok) throw new Error('Failed: ' + url);
      const text = await res.text();
      FILE_CONTENT += text + '\n';
    }
    FILE_CONTENT = FILE_CONTENT.trim();
    document.getElementById('content').textContent = FILE_CONTENT;
    const lines = FILE_CONTENT.split('\n').length;
    document.getElementById('lineCount').textContent = lines.toLocaleString();
    const sizeMB = (new Blob([FILE_CONTENT]).size / (1024 * 1024)).toFixed(1);
    document.getElementById('fileSize').textContent = sizeMB + ' MB';
  } catch (err) {
    document.getElementById('content').textContent = 'Error: ' + err.message;
  }
}
loadAllFiles();

function copyContent() {
  if (!FILE_CONTENT) { alert('Content not loaded yet.'); return; }
  navigator.clipboard.writeText(FILE_CONTENT).then(() => {
    const msg = document.getElementById('copyMsg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = FILE_CONTENT;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const msg = document.getElementById('copyMsg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 2000);
  });
}

// Ad gate: عند النقر على أي رابط في القائمة، افتح الإعلان أولاً ثم وجه للرابط
document.addEventListener('click', function(e) {
  const link = e.target.closest('#linkList a');
  if (!link) return;

  e.preventDefault();
  const url = link.getAttribute('href');

  // فتح PopUnder (الإعلان) في نافذة خلفية
  window.open('https://richinfo.co/richpartners/pops/js/richads-pu-ob.js?pubid=1010155&siteid=395855', '_blank');

  // توجيه المستخدم إلى الرابط الأصلي بعد فترة قصيرة
  setTimeout(function() {
    window.location.href = url;
  }, 100);
});
</script>
